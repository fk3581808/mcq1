<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrepreneurship Revision Master</title>
    <!-- Tailwind CSS for rapid, responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0fdf4;
            background-image: radial-gradient(#dcfce7 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .option-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
        }

        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .correct {
            background-color: #ecfdf5 !important;
            border-color: #10b981 !important;
            color: #047857 !important;
            animation: pop 0.4s ease;
        }

        .wrong {
            background-color: #fef2f2 !important;
            border-color: #ef4444 !important;
            color: #b91c1c !important;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .progress-bar-fill {
            transition: width 0.5s ease-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col text-slate-800 selection:bg-indigo-100 selection:text-indigo-900">

    <!-- Header -->
    <header class="w-full p-4 md:p-6 flex justify-between items-center max-w-5xl mx-auto">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center text-white shadow-lg shadow-indigo-200">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
            </div>
            <h1 class="text-xl md:text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-emerald-500">
                BizQuiz
            </h1>
        </div>
        <div class="bg-white px-4 py-2 rounded-full shadow-sm border border-slate-100 font-semibold text-slate-600">
            Score: <span id="score-display" class="text-indigo-600">0</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-3xl">
            
            <!-- Quiz Container -->
            <div id="quiz-container" class="glass-card rounded-3xl p-6 md:p-10 relative overflow-hidden">
                
                <!-- Progress Bar -->
                <div class="absolute top-0 left-0 w-full h-1.5 bg-slate-100">
                    <div id="progress-bar" class="progress-bar-fill h-full bg-gradient-to-r from-indigo-500 to-emerald-400 w-0"></div>
                </div>

                <!-- Header info -->
                <div class="flex justify-between items-center mb-8 mt-2">
                    <span class="text-sm font-semibold tracking-wider text-slate-400 uppercase" id="question-counter">
                        Question 1 of 40
                    </span>
                </div>

                <!-- Question -->
                <h2 id="question-text" class="text-2xl md:text-3xl font-bold leading-snug text-slate-800 mb-8">
                    Loading question...
                </h2>

                <!-- Options Grid -->
                <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                    <!-- Buttons generated by JS -->
                </div>

                <!-- Action Area -->
                <div class="flex flex-col sm:flex-row justify-between items-center gap-4 pt-4 border-t border-slate-100 min-h-[60px]">
                    <div id="action-left">
                        <button id="show-answer-btn" class="hidden text-slate-500 hover:text-emerald-600 font-medium flex items-center gap-2 transition-colors px-4 py-2 rounded-lg hover:bg-emerald-50">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                            Show Correct Answer
                        </button>
                    </div>
                    <div id="action-right">
                        <button id="next-btn" class="hidden w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-xl shadow-lg shadow-indigo-200 transition-all transform hover:scale-105 flex items-center justify-center gap-2">
                            Next Question
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Results Container (Hidden initially) -->
            <div id="results-container" class="hidden glass-card rounded-3xl p-8 md:p-12 text-center relative overflow-hidden">
                <div class="w-24 h-24 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg class="text-emerald-500" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="m7 8 5-5 5 5"/><path d="M2 21h20"/></svg>
                </div>
                <h2 class="text-3xl font-bold text-slate-800 mb-4">Revision Complete!</h2>
                <p class="text-lg text-slate-600 mb-8">You have successfully reviewed all the questions.</p>
                
                <div class="inline-block bg-slate-50 border border-slate-100 rounded-2xl p-6 mb-8 shadow-inner">
                    <div class="text-sm font-semibold tracking-wider text-slate-400 uppercase mb-2">Final Score</div>
                    <div class="text-5xl font-bold text-indigo-600"><span id="final-score">0</span><span class="text-2xl text-slate-400">/40</span></div>
                </div>

                <button onclick="restartQuiz()" class="bg-slate-800 hover:bg-slate-900 text-white font-semibold py-4 px-10 rounded-xl shadow-lg transition-all transform hover:scale-105 w-full sm:w-auto flex items-center justify-center gap-2 mx-auto">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    Restart Revision
                </button>
            </div>

        </div>
    </main>

    <script>
        // Cleaned up and strictly matched data array based on user input
        const questions = [
            { question: "Entrepreneurship leads to ______ in GDP.", options: ["Decrease", "Increase", "Neither increase nor decrease", "Stagnant"], answer: "Increase" },
            { question: "Concept of 'Scientific Management' was introduced by ______", options: ["Adam Smith", "F.W. Taylor", "Peter Drucker", "G.R. Terry"], answer: "F.W. Taylor" },
            { question: "Patent is granted for the period of ______ Years.", options: ["10", "20", "50", "60"], answer: "20" },
            { question: "A Partnership Firm can be started with a minimum number of ______ partners.", options: ["Two", "Seven", "Ten", "Twenty"], answer: "Two" },
            { question: "Motivation is a ______", options: ["Psychological situation", "Economic situation", "Legal situation", "Social situation"], answer: "Psychological situation" },
            { question: "Market driven idea is also known as ______", options: ["Evaluation of idea", "Demand driven idea", "Innovation", "Brainstorming"], answer: "Demand driven idea" },
            { question: "The Government of India considers an entity as start-up up to ______ years from the date of registration.", options: ["6", "8", "10", "12"], answer: "10" },
            { question: "Maslow's theory rests on the idea that human motivation consists of ______", options: ["Avoiding failure", "Hierarchy of needs", "Possibilities of achieving", "Control & involvement"], answer: "Hierarchy of needs" },
            { question: "Professors formed a society to buy land and flats for members. This form of business is called ______", options: ["Sole proprietorship", "Partnership", "Cooperative society", "Joint stock company"], answer: "Cooperative society" },
            { question: "'Start-ups India' was launched on ______", options: ["16 January 2016", "16 February 2016", "16 March 2016", "16 April 2016"], answer: "16 January 2016" },
            { question: "Which of the following are qualities of a successful entrepreneur?", options: ["They are confident", "They take responsibility", "They work hard", "All the above"], answer: "All the above" },
            { question: "A self-employed person improving business by taking risks and trying ideas is called ______", options: ["Skilled Man", "Business Man", "Entrepreneur", "None"], answer: "Entrepreneur" },
            { question: "______ is the first development bank of the country.", options: ["ICICI", "IDBI", "SFC", "IFCI"], answer: "IFCI" },
            { question: "How long is a patent valid in India?", options: ["10 years", "29 years", "20 years", "30 years"], answer: "20 years" },
            { question: "______ is the type of self-employment where one runs a business to satisfy own needs.", options: ["Entrepreneurship", "Entrepreneur", "Business Ideas", "None"], answer: "Entrepreneurship" },
            { question: "Which is the most important external factor governing recruitment?", options: ["Supply and demand", "Son of soil", "Labour Market", "None"], answer: "Labour Market" },
            { question: "What can be patented under Patent Act 1970?", options: ["Playing a game", "An Invention", "A scheme", "An aesthetic creation"], answer: "An Invention" },
            { question: "What is risk?", options: ["Negative consequence that could occur", "Negative consequence that will occur", "Negative consequence that must occur", "Negative consequence that shall occur"], answer: "Negative consequence that could occur" },
            { question: "Asset that can be converted into cash within short period is ______", options: ["Current Asset", "Fixed Asset", "Intangible Asset", "Investment"], answer: "Current Asset" },
            { question: "MSMED is defined under which act?", options: ["MSMED Act 2006", "MSMED Act 2001", "MSMED Act 1999", "MSMED Act 2004"], answer: "MSMED Act 2006" },
            { question: "MSMED stands for ______", options: ["Mini, Small & Medium Enterprises Development", "Micro, Small & Medium Entrepreneurship Department", "Micro, Small & Medium Enterprises Development", "Micro, Small & Medium Entrepreneurship Development"], answer: "Micro, Small & Medium Enterprises Development" },
            { question: "Which of the following is the function of SIDBI?", options: ["Extension of seed capital", "Discounting of Bill", "Providing factoring services", "All the above"], answer: "All the above" },
            { question: "Advertisement promotes ______", options: ["Purchase", "Production", "Sales", "Price"], answer: "Sales" },
            { question: "Main objective of recruitment and selection process is ______", options: ["Recruit the right candidates", "Meet the high labour turnover", "Reduce recruiting costs", "None of the above"], answer: "Recruit the right candidates" },
            { question: "Business arrangement giving access to intellectual property rights is called ______", options: ["Patent", "Trade Mark", "Copyright", "Licensing"], answer: "Licensing" },
            { question: "Accounting provides information on ______", options: ["Cost and income for manager", "Company tax liability", "Financial condition", "All the above"], answer: "All the above" },
            { question: "Whose liability is limited to business assets and private assets?", options: ["Partnership Firm", "Sole Proprietorship", "Co-Operative Society", "HUF"], answer: "Sole Proprietorship" },
            { question: "Angel Investors usually provide which type of financing?", options: ["Debt", "Equity", "Stock", "None"], answer: "Equity" },
            { question: "A business where one individual owns and conducts business affairs is called ______", options: ["Partnership", "Corporation", "Sole Proprietorship", "None of the above"], answer: "Sole Proprietorship" },
            { question: "Idea generation process of entrepreneur are ______", options: ["Germination", "Preparation", "Incubation", "All of these"], answer: "All of these" },
            { question: "More demanding products are ______", options: ["Less Profitable", "More dangerous", "More profitable", "Less dangerous"], answer: "More profitable" },
            { question: "Formation and management of partnership is governed by ______", options: ["Indian Partnership Act 1931", "Indian Partnership Act 1932", "Indian Partnership Act 1933", "Indian Partnership Act 1934"], answer: "Indian Partnership Act 1932" },
            { question: "SWOT stands for strength, ______ and Threats.", options: ["Weakness, Opportunity", "Work, Opposite", "Weakness, Operation", "Waste, Opportunity"], answer: "Weakness, Opportunity" },
            { question: "'Need for achievement' was developed by ______", options: ["David McClelland", "F.W. Taylor", "Joseph Schumpeter", "Carl Menger"], answer: "David McClelland" },
            { question: "An individual who starts, creates and manages a new business is called ______", options: ["A leader", "A manager", "A Professional", "An entrepreneur"], answer: "An entrepreneur" },
            { question: "The real owner of the joint stock company is ______", options: ["Board of directors", "Financer", "Shareholders", "Debenture holders"], answer: "Shareholders" },
            { question: "IDBI was established in the year ______", options: ["1944", "1954", "1964", "1974"], answer: "1964" },
            { question: "Entrepreneurs who blindly follow traditional methods despite loss are called ______ entrepreneur.", options: ["Adoptive", "Fabian", "Innovative", "Drone"], answer: "Fabian" },
            { question: "Copyright protection in India lasts for ______", options: ["Author's Lifetime + 60 Years", "Author's Lifetime + 50 Years", "Author's Lifetime + 40 Years", "Author's Lifetime + 20 Years"], answer: "Author's Lifetime + 60 Years" },
            { question: "To provide financial assistance to entrepreneurs, government set up several ______", options: ["Intermediaries", "Financial institutions", "Financial advisors", "Industrial estate"], answer: "Financial institutions" }
        ];

        // State variables
        let currentQuestionIndex = 0;
        let score = 0;
        let hasAnswered = false;

        // DOM Elements
        const questionCounterEl = document.getElementById('question-counter');
        const questionTextEl = document.getElementById('question-text');
        const optionsGridEl = document.getElementById('options-grid');
        const showAnswerBtn = document.getElementById('show-answer-btn');
        const nextBtn = document.getElementById('next-btn');
        const scoreDisplayEl = document.getElementById('score-display');
        const progressBarEl = document.getElementById('progress-bar');
        
        const quizContainer = document.getElementById('quiz-container');
        const resultsContainer = document.getElementById('results-container');
        const finalScoreEl = document.getElementById('final-score');

        function initQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            updateScore();
            quizContainer.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            hasAnswered = false;
            const currentQuestion = questions[currentQuestionIndex];
            
            // Update UI Counters
            questionCounterEl.textContent = `Question ${currentQuestionIndex + 1} of ${questions.length}`;
            const progressPercentage = ((currentQuestionIndex) / questions.length) * 100;
            progressBarEl.style.width = `${progressPercentage}%`;
            
            // Set Question Text
            questionTextEl.textContent = currentQuestion.question;
            
            // Clear previous options and hide buttons
            optionsGridEl.innerHTML = '';
            showAnswerBtn.classList.add('hidden');
            nextBtn.classList.add('hidden');

            // Render Options
            currentQuestion.options.forEach(optionText => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-5 rounded-2xl border-2 border-slate-200 bg-white hover:border-indigo-400 hover:bg-indigo-50 font-medium text-slate-700 flex justify-between items-center group';
                
                btn.innerHTML = `
                    <span class="pointer-events-none">${optionText}</span>
                    <span class="icon-container w-6 h-6 rounded-full border-2 border-slate-200 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"></span>
                `;
                
                btn.onclick = () => selectOption(btn, optionText, currentQuestion.answer);
                optionsGridEl.appendChild(btn);
            });
        }

        function selectOption(selectedBtn, selectedText, correctText) {
            if (hasAnswered) return;
            hasAnswered = true;

            const isCorrect = selectedText === correctText;
            const allButtons = optionsGridEl.querySelectorAll('button');
            
            // Disable all buttons
            allButtons.forEach(btn => {
                btn.disabled = true;
                btn.classList.add('cursor-not-allowed', 'opacity-70');
                btn.classList.remove('hover:border-indigo-400', 'hover:bg-indigo-50');
            });

            const iconContainer = selectedBtn.querySelector('.icon-container');
            iconContainer.classList.remove('border-slate-200', 'opacity-0');
            iconContainer.classList.add('opacity-100', 'border-transparent');

            if (isCorrect) {
                // Correct styling
                selectedBtn.classList.remove('opacity-70');
                selectedBtn.classList.add('correct');
                iconContainer.innerHTML = `<svg class="text-green-600" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
                score++;
                updateScore();
            } else {
                // Wrong styling
                selectedBtn.classList.remove('opacity-70');
                selectedBtn.classList.add('wrong');
                iconContainer.innerHTML = `<svg class="text-red-600" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
                
                // Show the "Show Answer" button since they got it wrong
                showAnswerBtn.classList.remove('hidden');
            }

            // Always show the next button once an option is picked
            nextBtn.classList.remove('hidden');
            
            // Scroll next button into view on mobile
            if(window.innerWidth < 768) {
                setTimeout(() => {
                    nextBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 100);
            }
        }

        // Handle "Show Answer" button click
        showAnswerBtn.addEventListener('click', () => {
            const currentQuestion = questions[currentQuestionIndex];
            const allButtons = optionsGridEl.querySelectorAll('button');
            
            allButtons.forEach(btn => {
                const spanText = btn.querySelector('span').textContent;
                if (spanText === currentQuestion.answer) {
                    btn.classList.remove('opacity-70', 'wrong');
                    btn.classList.add('correct');
                    
                    const iconContainer = btn.querySelector('.icon-container');
                    iconContainer.classList.remove('opacity-0', 'border-slate-200');
                    iconContainer.classList.add('opacity-100', 'border-transparent');
                    iconContainer.innerHTML = `<svg class="text-green-600" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
                }
            });
            
            // Hide the button after it's been used
            showAnswerBtn.classList.add('hidden');
        });

        // Handle Next Button
        nextBtn.addEventListener('click', () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        });

        function updateScore() {
            scoreDisplayEl.textContent = score;
        }

        function showResults() {
            quizContainer.classList.add('hidden');
            resultsContainer.classList.remove('hidden');
            finalScoreEl.textContent = score;
            progressBarEl.style.width = '100%';
        }

        function restartQuiz() {
            initQuiz();
        }

        // Start the application
        initQuiz();

    </script>
</body>
</html>
